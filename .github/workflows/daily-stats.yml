name: Daily Stats Scrape and Deploy

on:
  schedule:
    # Optimized per-day schedule: run ~1 hour after the last West Coast game ends.
    # West Coast evening games (latest starts ~6:30 PM PDT) finish ~10:30 PM PDT = 5:30 AM UTC.
    # Sunday games start much earlier (done by ~6 PM PDT = 1 AM UTC), so Monday fires at 2 AM UTC.
    - cron: '30 6 * * 0,2-6'  # 6:30 AM UTC (2:30 AM EDT) — Sun + Tue–Sat — captures Sat/Mon–Fri games
    - cron: '0 2 * * 1'        # 2:00 AM UTC (10:00 PM EDT Sun) — Mon only — captures Sunday games
  workflow_dispatch: {}    # manual trigger from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run stats scrape
        run: python3 batch_scrape_stats.py --refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # optional — remove if not using AI narratives

      - name: Run ESPN stats scrape
        run: python3 scrape_espn_stats.py

      - name: Run WMT/fallback stats scrape
        run: python3 scrape_wmt_stats.py

      - name: Write meta.json
        run: echo "{\"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > meta.json

      - name: Commit and push updated stats
        run: |
          git config user.name "Stats Bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add stats/ STATS_COVERAGE.md meta.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Daily stats update $(date -u +%Y-%m-%d)" &&
            git push origin main
          )

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
