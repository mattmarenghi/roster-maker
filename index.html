<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCAA D1 Baseball Roster Search</title>
  <script src="https://cdn.jsdelivr.net/npm/minisearch@7.1.1/dist/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 24px 20px 28px;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { font-size: 0.85rem; color: #8892b0; margin-top: 4px; }

    .search-wrap {
      max-width: 680px;
      margin: -20px auto 0;
      padding: 0 16px;
      position: relative;
      z-index: 10;
    }

    .search-box {
      width: 100%;
      padding: 16px 20px 16px 48px;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      outline: none;
      background: white;
      transition: box-shadow 0.2s;
    }
    .search-box:focus { box-shadow: 0 4px 28px rgba(0,0,0,0.18); }

    .search-icon {
      position: absolute;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      color: #8892b0;
      pointer-events: none;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 16px;
      right: 16px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      overflow: hidden;
      display: none;
    }
    .dropdown.open { display: block; }

    .suggestion {
      padding: 12px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #f0f0f5;
      transition: background 0.1s;
    }
    .suggestion:last-child { border-bottom: none; }
    .suggestion:hover, .suggestion.active { background: #f0f4ff; }

    .sug-name { font-weight: 600; font-size: 0.95rem; }
    .sug-name mark { background: none; color: #4361ee; font-weight: 700; }
    .sug-meta { font-size: 0.8rem; color: #8892b0; white-space: nowrap; }
    .sug-school { font-size: 0.82rem; color: #555; flex: 1; text-align: right; }

    .results-area {
      max-width: 680px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .status-msg {
      text-align: center;
      color: #8892b0;
      font-size: 0.88rem;
      padding: 32px 0;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-left: 2px;
    }
    .results-header-text {
      font-size: 0.82rem;
      color: #8892b0;
    }

    /* ── Favorites bar ───────────────────────────────────────────────────── */
    .favorites-bar {
      max-width: 680px;
      margin: 16px auto 0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .fav-tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #8892b0;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .fav-tab-btn:hover { background: #fff8e7; color: #e6a817; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
    .fav-tab-btn.active { background: #fff3cd; color: #c47a00; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
    .fav-tab-btn svg { flex-shrink: 0; }

    .fav-count-badge {
      background: #f0b429;
      color: #7a4f00;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 1px 7px;
      min-width: 20px;
      text-align: center;
      display: none;
    }
    .fav-count-badge.visible { display: inline-block; }

    /* ── Auth pill ───────────────────────────────────────────────────────── */
    .auth-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4361ee;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.15s;
    }
    .auth-pill:hover { background: #eef1ff; }

    .auth-avatar {
      width: 22px;
      height: 22px;
      background: #4361ee;
      color: white;
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .auth-signout {
      background: none;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      color: #8892b0;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      background: white;
      transition: color 0.15s;
    }
    .auth-signout:hover { color: #4361ee; }

    /* ── Auth modal ──────────────────────────────────────────────────────── */
    .auth-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-overlay.open { display: flex; }

    .auth-modal {
      background: white;
      border-radius: 20px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    .auth-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #aab;
      cursor: pointer;
      line-height: 1;
      padding: 4px 6px;
    }
    .auth-close:hover { color: #555; }

    .auth-modal h2 {
      font-size: 1.15rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 5px;
    }
    .auth-modal p {
      font-size: 0.85rem;
      color: #8892b0;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .auth-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1.5px solid #e0e4f0;
      border-radius: 12px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
      background: white;
    }
    .auth-input:focus { border-color: #4361ee; }

    .auth-input-code {
      letter-spacing: 0.25em;
      font-size: 1.4rem;
      text-align: center;
      font-weight: 700;
    }

    .auth-submit {
      width: 100%;
      padding: 14px;
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .auth-submit:hover { background: #3451d1; }
    .auth-submit:disabled { background: #a0aeea; cursor: default; }

    .auth-error {
      font-size: 0.82rem;
      color: #dc2626;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    .auth-back {
      background: none;
      border: none;
      color: #8892b0;
      font-size: 0.82rem;
      cursor: pointer;
      margin-top: 10px;
      text-align: center;
      width: 100%;
      padding: 6px;
      transition: color 0.15s;
    }
    .auth-back:hover { color: #4361ee; }

    /* ── Star button on cards ───────────────────────────────────────────── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      cursor: default;
    }

    .card-num {
      font-size: 1.4rem;
      font-weight: 800;
      color: #d0d7e8;
      min-width: 36px;
      text-align: center;
      line-height: 1;
      padding-top: 2px;
    }

    .card-body {}
    .card-name { font-weight: 700; font-size: 1rem; }
    .card-name mark { background: none; color: #4361ee; }
    .card-school { font-size: 0.85rem; color: #4361ee; font-weight: 500; margin-top: 2px; }
    .card-details { font-size: 0.8rem; color: #8892b0; margin-top: 6px; line-height: 1.6; }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .card-badge {
      font-size: 0.75rem;
      font-weight: 700;
      background: #eef1ff;
      color: #4361ee;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      color: #ccc;
      transition: color 0.15s, transform 0.15s;
      line-height: 1;
      margin-top: 2px;
    }
    .star-btn:hover { color: #f0b429; transform: scale(1.15); }
    .star-btn.starred { color: #f0b429; }
    .star-btn.starred:hover { color: #c47a00; }

    /* ── Favorited Players view header ──────────────────────────────────── */
    .fav-view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 4px 8px;
      margin-bottom: 4px;
    }
    .fav-view-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a2e;
    }
    .fav-view-count {
      font-size: 0.82rem;
      color: #8892b0;
    }

    /* ── Favorites Cards ─────────────────────────────────────────────────── */
    .fav-card {
      background: white;
      border-radius: 18px;
      padding: 18px 18px 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    }

    .fav-card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }

    .fav-photo {
      width: 68px;
      height: 68px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      font-weight: 800;
      overflow: hidden;
    }
    .fav-photo-img {
      object-fit: cover;
      object-position: top;
    }

    .fav-player-info {
      flex: 1;
      min-width: 0;
      padding-top: 2px;
    }

    .fav-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .fav-player-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.2;
    }

    .fav-pos-badge {
      background: #4361ee;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .fav-school-name {
      font-size: 0.875rem;
      color: #444;
      margin-bottom: 5px;
    }

    .fav-physical {
      font-size: 0.85rem;
      color: #4361ee;
      font-weight: 600;
    }

    .fav-star-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #f0b429;
      padding: 2px;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 1px;
      transition: color 0.15s, transform 0.15s;
    }
    .fav-star-btn:hover { color: #c47a00; transform: scale(1.15); }

    .fav-divider {
      height: 1px;
      background: #f0f2f7;
      margin: 0 0 14px;
    }

    .fav-stat-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .fav-stat-row:last-of-type { margin-bottom: 0; }

    .fav-stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: #eef1ff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #4361ee;
      margin-top: 1px;
    }

    .fav-stat-content { flex: 1; }

    .fav-stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #9aa0b4;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .fav-stat-main {
      font-size: 0.97rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
    }

    .fav-stat-detail {
      font-size: 0.83rem;
      color: #666;
      margin-top: 2px;
    }

    .fav-profile-btn {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 13px;
      background: #eef1ff;
      color: #4361ee;
      border: none;
      border-radius: 11px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .fav-profile-btn:hover { background: #dde3ff; }

    /* ── Favorites empty state ──────────────────────────────────────────── */
    .favorites-empty {
      text-align: center;
      padding: 48px 20px;
      color: #8892b0;
    }
    .favorites-empty svg { margin-bottom: 12px; opacity: 0.35; }
    .favorites-empty p { font-size: 0.92rem; }
    .favorites-empty small { font-size: 0.8rem; margin-top: 6px; display: block; }
    .favorites-empty .auth-submit {
      margin: 20px auto 0;
      max-width: 180px;
      padding: 12px;
    }

    .load-bar {
      width: 100%;
      height: 3px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .load-bar-fill {
      height: 100%;
      background: #4361ee;
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    .stats-unavailable {
      color: #9aa0b4;
      font-style: italic;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .fav-stat-narrative {
      font-size: 0.8rem;
      color: #8892b0;
      margin-top: 3px;
      font-style: italic;
      line-height: 1.4;
    }

    .fav-record-badge {
      background: #f0fff4;
      color: #2d6a4f;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ── Auth modal ──────────────────────────────────────────────────────────── -->
<div class="auth-overlay" id="authOverlay" onclick="overlayClick(event)">
  <div class="auth-modal">
    <button class="auth-close" onclick="hideAuthModal()">×</button>

    <div id="authStep1">
      <h2>Sign in</h2>
      <p>Enter your email and we'll send you a 6-digit sign-in code.</p>
      <input class="auth-input" id="authEmail" type="email"
             placeholder="your@email.com" autocomplete="email">
      <button class="auth-submit" id="authSendBtn" onclick="sendOTP()">Send code</button>
      <div class="auth-error" id="authError1"></div>
    </div>

    <div id="authStep2" style="display:none">
      <h2>Check your email</h2>
      <p id="authCodeDesc">Enter the 6-digit code we sent you.</p>
      <input class="auth-input auth-input-code" id="authCode" type="text"
             inputmode="numeric" placeholder="000000" maxlength="6"
             autocomplete="one-time-code">
      <button class="auth-submit" id="authVerifyBtn" onclick="verifyOTP()">Sign in</button>
      <div class="auth-error" id="authError2"></div>
      <button class="auth-back" onclick="showAuthStep1()">← Use a different email</button>
    </div>
  </div>
</div>

<header>
  <h1>NCAA D1 Baseball Roster Search</h1>
  <p id="subtitle">Loading player data…</p>
  <div class="load-bar"><div class="load-bar-fill" id="loadBar"></div></div>
</header>

<div class="search-wrap">
  <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input class="search-box" id="searchBox" type="search"
         placeholder="Search players, schools, positions…" autocomplete="off" disabled>
  <div class="dropdown" id="dropdown"></div>
</div>

<div class="favorites-bar">
  <div id="authArea"></div>
  <button class="fav-tab-btn" id="favTabBtn" onclick="toggleFavoritesView()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
    Favorites
    <span class="fav-count-badge" id="favCountBadge">0</span>
  </button>
</div>

<div class="results-area" id="resultsArea">
  <p class="status-msg" id="statusMsg"></p>
</div>

<script>
  const $ = id => document.getElementById(id);
  let miniSearch, allPlayers = [];
  let activeIdx = -1;
  let currentResults = [];
  let showingFavorites = false;
  let playerStatsMap = {};
  let schoolStatsMap = {};

  // ── Supabase ────────────────────────────────────────────────────────────────
  const db = supabase.createClient(
    'https://otqfemjslhciiiafdnia.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90cWZlbWpzbGhjaWlpYWZkbmlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTMyMTcsImV4cCI6MjA4ODMyOTIxN30.uuAnKzw97T4Y9MDfaiM1IqaZF5vYLn5SZPt2QkGlEtA'
  );

  let currentUser = null;
  let pendingEmail = '';
  let favorites = new Set();

  // ── Auth state ──────────────────────────────────────────────────────────────
  db.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user ?? null;
    renderAuthBtn();
    if (currentUser) {
      await fetchFavorites();
    } else {
      favorites = new Set();
      updateFavBadge();
      if (showingFavorites) renderFavoritesView();
    }
  });

  function renderAuthBtn() {
    const area = $('authArea');
    if (currentUser) {
      const initial = (currentUser.email || '?').charAt(0).toUpperCase();
      area.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px">
          <div class="auth-avatar">${initial}</div>
          <button class="auth-signout" onclick="signOut()">Sign out</button>
        </div>`;
    } else {
      area.innerHTML = `<button class="auth-pill" onclick="showAuthModal()">Sign in</button>`;
    }
  }

  async function signOut() {
    await db.auth.signOut();
  }

  // ── Favorites (Supabase) ────────────────────────────────────────────────────
  async function fetchFavorites() {
    const { data } = await db.from('favorites').select('player_id');
    favorites = new Set((data || []).map(r => r.player_id));
    updateFavBadge();
    if (showingFavorites) renderFavoritesView();
  }

  async function toggleFavorite(id) {
    if (!currentUser) {
      showAuthModal();
      return;
    }
    if (favorites.has(id)) {
      favorites.delete(id);
      db.from('favorites').delete().match({ user_id: currentUser.id, player_id: id });
    } else {
      favorites.add(id);
      db.from('favorites').insert({ user_id: currentUser.id, player_id: id });
    }
    updateFavBadge();
    document.querySelectorAll(`.star-btn[data-id="${id}"]`).forEach(btn => {
      btn.classList.toggle('starred', favorites.has(id));
      btn.title = favorites.has(id) ? 'Remove from favorites' : 'Add to favorites';
    });
    if (showingFavorites) renderFavoritesView();
  }

  function updateFavBadge() {
    const badge = $('favCountBadge');
    badge.textContent = favorites.size;
    badge.classList.toggle('visible', favorites.size > 0);
  }

  // ── Auth modal ──────────────────────────────────────────────────────────────
  function showAuthModal() {
    showAuthStep1();
    $('authOverlay').classList.add('open');
    setTimeout(() => $('authEmail').focus(), 50);
  }

  function hideAuthModal() {
    $('authOverlay').classList.remove('open');
  }

  function overlayClick(e) {
    if (e.target === $('authOverlay')) hideAuthModal();
  }

  function showAuthStep1() {
    $('authStep1').style.display = '';
    $('authStep2').style.display = 'none';
    $('authError1').textContent = '';
    $('authEmail').value = '';
  }

  async function sendOTP() {
    const email = $('authEmail').value.trim();
    if (!email) return;

    const btn = $('authSendBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    $('authError1').textContent = '';

    const { error } = await db.auth.signInWithOtp({ email });

    if (error) {
      $('authError1').textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Send code';
    } else {
      pendingEmail = email;
      $('authCodeDesc').textContent = `Enter the 6-digit code we sent to ${email}.`;
      $('authStep1').style.display = 'none';
      $('authStep2').style.display = '';
      $('authError2').textContent = '';
      $('authCode').value = '';
      btn.disabled = false;
      btn.textContent = 'Send code';
      setTimeout(() => $('authCode').focus(), 50);
    }
  }

  async function verifyOTP() {
    const token = $('authCode').value.trim();
    if (token.length !== 6) return;

    const btn = $('authVerifyBtn');
    btn.disabled = true;
    btn.textContent = 'Verifying…';
    $('authError2').textContent = '';

    const { error } = await db.auth.verifyOtp({
      email: pendingEmail,
      token,
      type: 'email',
    });

    if (error) {
      $('authError2').textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Sign in';
    } else {
      hideAuthModal();
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  // Enter key support in auth inputs
  document.addEventListener('DOMContentLoaded', () => {
    $('authEmail').addEventListener('keydown', e => { if (e.key === 'Enter') sendOTP(); });
    $('authCode').addEventListener('keydown', e => { if (e.key === 'Enter') verifyOTP(); });
  });

  // ── Favorites view toggle ───────────────────────────────────────────────────
  function toggleFavoritesView() {
    showingFavorites = !showingFavorites;
    $('favTabBtn').classList.toggle('active', showingFavorites);
    $('searchBox').disabled = showingFavorites;

    if (showingFavorites) {
      hideDropdown();
      renderFavoritesView();
    } else {
      const q = $('searchBox').value.trim();
      $('searchBox').disabled = false;
      if (q.length >= 2 && currentResults.length) {
        renderCards(currentResults.slice(0, 30), q);
      } else {
        $('resultsArea').innerHTML = '<p class="status-msg" id="statusMsg"></p>';
      }
    }
  }

  // ── Real stats helpers ───────────────────────────────────────────────────────
  function formatLastGame(playerData) {
    const lg = playerData.last_game;
    if (!lg) return null;

    const main = `${lg.result} vs ${lg.opponent}`;
    let detail = '';

    if (lg.batting && (lg.batting.ab > 0 || lg.batting.rbi > 0)) {
      detail = `${lg.batting.h}/${lg.batting.ab}`;
      if (lg.batting.rbi)  detail += `, ${lg.batting.rbi} RBI`;
      if (lg.batting.bb)   detail += `, ${lg.batting.bb} BB`;
      if (lg.batting.hr)   detail += `, ${lg.batting.hr} HR`;
    } else if (lg.pitching) {
      detail = `${lg.pitching.ip} IP · ${lg.pitching.so} K · ${lg.pitching.er} ER`;
    }

    return { main, detail, date: lg.date, narrative: playerData.narrative || '' };
  }

  function formatSeasonStats(playerData) {
    if (playerData.season_batting) {
      const b = playerData.season_batting;
      const avg = b.avg.toFixed(3).replace(/^0/, '');
      const main = `${avg} AVG · ${b.hr} HR · ${b.rbi} RBI`;
      const detail = `${b.ops.toFixed(3)} OPS · ${b.g} G · ${b.h} H`;
      return { main, detail };
    }
    if (playerData.season_pitching) {
      const pit = playerData.season_pitching;
      const main = `${pit.era.toFixed(2)} ERA · ${pit.w}-${pit.l} · ${pit.so} K`;
      const detail = `${pit.whip.toFixed(2)} WHIP · ${pit.ip} IP · ${pit.g}G`;
      return { main, detail };
    }
    return null;
  }

  // ── Favorites card layout ────────────────────────────────────────────────────
  function favCardHTML(p) {
    const isFav = favorites.has(p.id);
    const initials = ((p.fn || '').charAt(0) + (p.ln || '').charAt(0)).toUpperCase();
    const physical = [p.yr, p.ht, p.wt ? p.wt + ' lbs' : ''].filter(Boolean).join(' \u2022 ');
    const pos = p.pos ? p.pos.split('/')[0].trim() : '';

    const bgColors   = ['#cfe2ff','#d1fae5','#fff3cd','#fce7f3','#ede9fe','#d0f0fd'];
    const textColors = ['#084298','#065f46','#7a4f00','#831843','#4c1d95','#0c4a6e'];
    const ci = parseInt(p.id.slice(0, 1), 16) % bgColors.length;
    const photoEl = p.photo_url
      ? `<img class="fav-photo fav-photo-img" src="${p.photo_url}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'fav-photo\\' style=\\'background:${bgColors[ci]};color:${textColors[ci]}\\'>${initials}</div>'">`
      : `<div class="fav-photo" style="background:${bgColors[ci]};color:${textColors[ci]}">${initials}</div>`;

    const playerData  = playerStatsMap[p.id] || null;
    const schoolData  = schoolStatsMap[p.school] || null;
    const lastGame    = playerData ? formatLastGame(playerData) : null;
    const seasonStats = playerData ? formatSeasonStats(playerData) : null;

    const recordBadge = schoolData
      ? `<span class="fav-record-badge">${schoolData.record}</span>`
      : '';

    const unavailable = `<div class="fav-stat-main stats-unavailable">Stats currently unavailable</div>`;

    const lastGameHTML = lastGame
      ? `<div class="fav-stat-main">${lastGame.main}</div>
         ${lastGame.detail   ? `<div class="fav-stat-detail">${lastGame.detail}</div>` : ''}
         ${lastGame.narrative ? `<div class="fav-stat-narrative">${lastGame.narrative}</div>` : ''}`
      : unavailable;

    const seasonStatsHTML = seasonStats
      ? `<div class="fav-stat-main">${seasonStats.main}</div>
         <div class="fav-stat-detail">${seasonStats.detail}</div>`
      : unavailable;

    return `
      <div class="fav-card">
        <div class="fav-card-header">
          ${photoEl}
          <div class="fav-player-info">
            <div class="fav-name-row">
              <span class="fav-player-name">${p.name}</span>
              ${pos ? `<span class="fav-pos-badge">${pos}</span>` : ''}
              ${recordBadge}
            </div>
            <div class="fav-school-name">${p.school}</div>
            ${physical ? `<div class="fav-physical">${physical}</div>` : ''}
          </div>
          <button class="fav-star-btn" data-id="${p.id}"
                  title="Remove from favorites"
                  onclick="toggleFavorite('${p.id}')">
            <svg width="22" height="22" viewBox="0 0 24 24"
                 fill="${isFav ? 'currentColor' : 'none'}"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </button>
        </div>

        <div class="fav-divider"></div>

        <div class="fav-stat-row">
          <div class="fav-stat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M5.2 5.2c3.8 3.8 3.8 9.8 0 13.6"/>
              <path d="M18.8 5.2c-3.8 3.8-3.8 9.8 0 13.6"/>
            </svg>
          </div>
          <div class="fav-stat-content">
            <div class="fav-stat-label">Latest Game</div>
            ${lastGameHTML}
          </div>
        </div>

        <div class="fav-stat-row">
          <div class="fav-stat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
          </div>
          <div class="fav-stat-content">
            <div class="fav-stat-label">Season Stats</div>
            ${seasonStatsHTML}
          </div>
        </div>

        <button class="fav-profile-btn" onclick="alert('Full profile coming soon!')">
          View Full Profile
        </button>
      </div>`;
  }

  function renderFavoritesView() {
    const area = $('resultsArea');

    if (!currentUser) {
      area.innerHTML = `
        <div class="favorites-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <p>Sign in to save favorites</p>
          <small>Your starred players will sync across devices.</small>
          <button class="auth-submit" onclick="showAuthModal()">Sign in</button>
        </div>`;
      return;
    }

    if (favorites.size === 0) {
      area.innerHTML = `
        <div class="favorites-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <p>No favorites yet</p>
          <small>Hit the star on any player card to save them here.</small>
        </div>`;
      return;
    }

    const favPlayers = allPlayers.filter(p => favorites.has(p.id));
    const header = `
      <div class="fav-view-header">
        <span class="fav-view-title">Favorited Players</span>
        <span class="fav-view-count">${favPlayers.length} player${favPlayers.length !== 1 ? 's' : ''}</span>
      </div>`;
    area.innerHTML = header + favPlayers.map(p => favCardHTML(p)).join('');
  }

  // ── Load stats files ────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const idxRes = await fetch('stats/index.json');
      if (!idxRes.ok) return;
      const slugs = await idxRes.json();
      await Promise.all(slugs.map(async slug => {
        try {
          const res = await fetch(`stats/${slug}.json`);
          if (!res.ok) return;
          const data = await res.json();
          schoolStatsMap[data.school] = data;
          for (const [id, player] of Object.entries(data.players || {})) {
            playerStatsMap[id] = player;
          }
        } catch (e) { /* skip missing files */ }
      }));
    } catch (e) { /* no index, skip */ }
  }

  // ── Load data ──────────────────────────────────────────────────────────────
  async function init() {
    $('loadBar').style.width = '30%';
    const res = await fetch('players.json');
    $('loadBar').style.width = '70%';
    allPlayers = await res.json();
    $('loadBar').style.width = '90%';
    await loadStats();

    miniSearch = new MiniSearch({
      fields: ['name', 'school', 'pos', 'hometown', 'hs'],
      storeFields: ['id','fn','ln','name','num','pos','bt','yr','ht','wt','school','conf','st','hometown','hs'],
      searchOptions: {
        boost: { name: 3, school: 2 },
        fuzzy: 0.2,
        prefix: true,
      },
    });
    miniSearch.addAll(allPlayers);

    $('loadBar').style.width = '100%';
    setTimeout(() => $('loadBar').style.display = 'none', 400);

    const schools = new Set(allPlayers.map(p => p.school)).size;
    $('subtitle').textContent =
      `${allPlayers.length.toLocaleString()} players · ${schools} schools · 2026 season`;
    $('searchBox').disabled = false;
    $('searchBox').focus();

    renderAuthBtn();
    updateFavBadge();
  }

  // ── Highlight matched term ─────────────────────────────────────────────────
  function highlight(text, query) {
    if (!query || !text) return text;
    const terms = query.trim().split(/\s+/).filter(Boolean);
    let out = text;
    for (const t of terms) {
      const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      out = out.replace(re, '<mark>$1</mark>');
    }
    return out;
  }

  // ── Build card HTML ────────────────────────────────────────────────────────
  function cardHTML(p, query) {
    const details = [
      p.bt       ? `B/T: ${p.bt}` : '',
      p.ht       ? p.ht : '',
      p.wt       ? `${p.wt} lbs` : '',
      p.hometown ? p.hometown : '',
      p.hs       ? `HS: ${p.hs}` : '',
    ].filter(Boolean).join(' · ');

    const isFav = favorites.has(p.id);
    const starTitle = isFav ? 'Remove from favorites' : 'Add to favorites';

    return `
      <div class="card">
        <div class="card-num">${p.num != null ? '#' + p.num : ''}</div>
        <div class="card-body">
          <div class="card-name">${highlight(p.name, query)}</div>
          <div class="card-school">${highlight(p.school, query)}</div>
          ${details ? `<div class="card-details">${details}</div>` : ''}
        </div>
        <div class="card-right">
          ${p.pos ? `<div class="card-badge">${p.pos}</div>` : ''}
          ${p.yr  ? `<div class="card-badge" style="background:#f0fff4;color:#2d6a4f">${p.yr}</div>` : ''}
          <button class="star-btn${isFav ? ' starred' : ''}"
                  data-id="${p.id}"
                  title="${starTitle}"
                  onclick="toggleFavorite('${p.id}')">
            <svg width="18" height="18" viewBox="0 0 24 24"
                 fill="${isFav ? 'currentColor' : 'none'}"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </button>
        </div>
      </div>`;
  }

  // ── Dropdown suggestions ───────────────────────────────────────────────────
  function showDropdown(query, results) {
    const dd = $('dropdown');
    if (!results.length) { dd.classList.remove('open'); return; }

    dd.innerHTML = results.slice(0, 8).map((p, i) => `
      <div class="suggestion" data-idx="${i}"
           onmousedown="selectSuggestion(event,${i})">
        <span class="sug-name">${highlight(p.name, query)}</span>
        <span class="sug-meta">${p.pos || '—'}${p.yr ? ' · ' + p.yr : ''}</span>
        <span class="sug-school">${p.school}</span>
      </div>`).join('');
    activeIdx = -1;
    dd.classList.add('open');
  }

  function hideDropdown() {
    $('dropdown').classList.remove('open');
    activeIdx = -1;
  }

  function selectSuggestion(e, idx) {
    e.preventDefault();
    const p = currentResults[idx];
    $('searchBox').value = p.name;
    hideDropdown();
    renderCards([p], p.name);
  }

  // ── Main search ────────────────────────────────────────────────────────────
  let debounceTimer;
  $('searchBox').addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => runSearch(e.target.value.trim()), 80);
  });

  function runSearch(query) {
    if (query.length < 2) {
      hideDropdown();
      $('resultsArea').innerHTML = '<p class="status-msg" id="statusMsg"></p>';
      return;
    }

    currentResults = miniSearch.search(query, { limit: 50 });
    showDropdown(query, currentResults);
    renderCards(currentResults.slice(0, 30), query);
  }

  // ── Keyboard navigation ───────────────────────────────────────────────────
  $('searchBox').addEventListener('keydown', e => {
    const items = $('dropdown').querySelectorAll('.suggestion');
    if (!items.length) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, -1);
    } else if (e.key === 'Enter' && activeIdx >= 0) {
      e.preventDefault();
      const p = currentResults[activeIdx];
      $('searchBox').value = p.name;
      hideDropdown();
      renderCards([p], p.name);
      return;
    } else if (e.key === 'Escape') {
      hideDropdown();
      return;
    } else { return; }

    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) hideDropdown();
  });

  $('searchBox').addEventListener('focus', () => {
    const q = $('searchBox').value.trim();
    if (q.length >= 2 && currentResults.length) showDropdown(q, currentResults);
  });

  // ── Render result cards ────────────────────────────────────────────────────
  function renderCards(results, query) {
    const area = $('resultsArea');
    if (!results.length) {
      area.innerHTML = '<p class="status-msg">No results found.</p>';
      return;
    }

    const header = `
      <div class="results-header">
        <span class="results-header-text">${results.length} result${results.length !== 1 ? 's' : ''}${results.length === 30 ? ' (showing top 30)' : ''}</span>
      </div>`;

    area.innerHTML = header + results.map(p => cardHTML(p, query)).join('');
  }

  init().catch(err => {
    $('subtitle').textContent = 'Failed to load player data.';
    console.error(err);
  });
</script>
</body>
</html>
